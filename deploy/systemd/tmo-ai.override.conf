[Service]
# Force using Hugging Face pipeline instead of Ollama
Environment=TMO_AI_FORCE_HF=1
# Choose a small HF model suitable for low-RAM servers
Environment=TMO_AI_HF_MODEL=facebook/blenderbot-400M-distill
# Optional: make transformers cache writable by the service user (adjust if needed)
# Environment=TRANSFORMERS_CACHE=/var/cache/tmo-ai/huggingface
# Environment=XDG_CACHE_HOME=/var/cache/tmo-ai
