server {
    listen 80;
    listen [::]:80;
    server_name taskmind.jasamaritim.co.id; # <- replace with your domain

    root /var/www/tmo-ai;
    index index.html;

    # Serve single-page app; fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the FastAPI backend
    location /api/ {
        # preserve the full request URI (including /api/ prefix) when proxying
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # timeouts tuned for long-running AI responses
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_request_buffering off;
        client_max_body_size 100M;
    }

    # Optional: serve /.well-known for ACME challenges
    location ~ /.well-known/acme-challenge/ {
        allow all;
        root /var/www/tmo-ai;
    }

    # Logging
    access_log /var/log/nginx/tmo-ai.access.log;
    error_log /var/log/nginx/tmo-ai.error.log;
}
