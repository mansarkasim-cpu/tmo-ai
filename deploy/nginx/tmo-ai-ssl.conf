server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name taskmind.jasamaritim.co.id;

    ssl_certificate /etc/letsencrypt/live/taskmind.jasamaritim.co.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/taskmind.jasamaritim.co.id/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    root /var/www/tmo-ai;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        # preserve the full request URI (including /api/ prefix) when proxying
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # timeouts tuned for long-running AI responses
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_request_buffering off;
        client_max_body_size 100M;
    }

    access_log /var/log/nginx/tmo-ai.access.log;
    error_log /var/log/nginx/tmo-ai.error.log;
}

server {
    listen 80;
    listen [::]:80;
    server_name taskmind.jasamaritim.co.id;
    return 301 https://$host$request_uri;
}
